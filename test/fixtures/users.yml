# Devise password is `password123` (>= 8 chars, no special required).
# encrypted_password is generated by BCrypt; use User.new(...).encrypted_password offline if you need to regenerate.

volunteer:
  email: volunteer@example.com
  encrypted_password: <%= Devise::Encryptor.digest(User, 'password123') %>
  role: 0

admin:
  email: admin@example.com
  encrypted_password: <%= Devise::Encryptor.digest(User, 'password123') %>
  role: 1
